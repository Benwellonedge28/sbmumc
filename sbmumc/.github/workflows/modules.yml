name: Module Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1

jobs:
  # Module count verification
  module-count:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count modules
        id: count
        run: |
          MODULE_COUNT=$(find src -type d -maxdepth 1 -exec basename {} \; | grep -v "^src$" | wc -l)
          echo "Total modules: $MODULE_COUNT"
          echo "count=$MODULE_COUNT" >> $GITHUB_OUTPUT

      - name: Check minimum threshold
        run: |
          if [ ${{ steps.count.outputs.count }} -lt 1600 ]; then
            echo "Warning: Expected at least 1600 modules"
          fi

  # Module syntax validation
  module-syntax:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - src/ai
          - src/security
          - src/quantum
          - src/robotics
          - src/nlp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          version: stable

      - name: Check modules in ${{ matrix.directory }}
        run: |
          find ${{ matrix.directory }} -name "mod.rs" -exec \
            cargo check --message-format=short {} \;

  # Module structure validation
  module-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module structure
        run: |
          # Each module should have mod.rs
          MISSING=$(find src -type d -maxdepth 1 ! -path src ! -exec test -f {}/mod.rs \; -print | wc -l)
          if [ $MISSING -gt 0 ]; then
            echo "Some modules are missing mod.rs"
            exit 1
          fi

      - name: Check for compilation
        run: |
          cargo check --all-targets

  # Module API consistency
  api-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          version: stable

      - name: Run API consistency checks
        run: |
          cargo clippy -- -W clippy::missing_docs_in_private_items
          cargo doc --all-features --no-deps

  # Documentation generation
  module-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          version: stable

      - name: Generate documentation
        run: cargo doc --all-features --all-targets

      - name: Check doc coverage
        run: |
          MISSING=$(grep -r "//!" src | wc -l)
          echo "Documentation comments: $MISSING"

      - name: Deploy documentation
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc