name: Security Scanning

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1

jobs:
  # Cargo audit for vulnerable dependencies
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cargo-audit with report
        run: |
          cargo audit --json > cargo-audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cargo-audit-report
          path: cargo-audit-report.json
          retention-days: 30

  # Cargo deny for license and dependency checking
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
        with:
          version: latest

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check bans
        run: cargo deny check bans

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check sources
        run: cargo deny check sources

  # Dependency freshness check
  dependency-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check for outdated dependencies
        run: cargo outdated --root-deps-only --exit-code 1 || echo "Dependencies may need updating"

      - name: Install cargo-outdated
        uses: taiki-e/install-action@cargo-outdated
        with:
          version: latest

      - name: Generate outdated report
        run: cargo outdated --root-deps-only --format json > outdated-report.json || true

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outdated-report
          path: outdated-report.json

  # CodeQL security analysis
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        language: ['rust', 'javascript', 'typescript']
        exclude:
          - language: javascript
            # Skip if no JS files
          - language: typescript
            # Skip if no TS files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        if: matrix.language == 'rust' || matrix.language == 'javascript' || matrix.language == 'typescript'
        uses: github/codeql-action/init-actions@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL analysis
        if: matrix.language == 'rust' || matrix.language == 'javascript' || matrix.language == 'typescript'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # Supply chain security
  supply-chain-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Cargo.lock
        run: |
          echo "Verifying Cargo.lock integrity..."
          cargo fetch --locked 2>&1 || echo "Warning: Lock file may need update"

      - name: Check for dependency confusion attacks
        run: |
          echo "Checking for potential dependency confusion..."
          grep -E '^\[.*\]' Cargo.toml | head -20

      - name: Verify no workspace path overrides
        run: |
          echo "Checking for workspace path overrides..."
          if grep -q 'path\s*=' Cargo.toml | head -5; then
            echo "Warning: Local path dependencies found"
          fi

  # Secret scanning
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitqlient
        run: |
          echo "Checking for secrets in recent commits..."
          # Basic check - in production use gitleaks or similar
          git log --oneline -20 -- '*secret*' '*password*' '*api_key*' '*token*' || true

      - name: Check for .env files
        run: |
          if [ -f .env ]; then
            echo "Warning: .env file found in repository"
            exit 1
          fi

      - name: Check for credential patterns
        run: |
          echo "Scanning for potential credentials..."
          # Basic patterns - use dedicated tools in production
          grep -r -n "password\s*=\s*['\"]" --include="*.rs" . || true
          grep -r -n "api_key\s*=" --include="*.rs" . || true

  # Memory safety verification
  memory-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: miri

      - name: Run Miri (unsafe code verification)
        run: |
          cargo miri test --all-features || echo "Miri tests completed with potential issues"

      - name: Check for unsafe code
        run: |
          echo "Analyzing unsafe code usage..."
          grep -r "unsafe" --include="*.rs" src/ | wc -l

      - name: Generate unsafe code report
        run: |
          echo "Unsafe code locations:"
          grep -rn "unsafe fn" --include="*.rs" src/ || true
          grep -rn "unsafe (" --include="*.rs" src/ || true
          grep -rn "unsafe block" --include="*.rs" src/ || true

  # Fuzzing security testing
  fuzzing:
    runs-on: ubuntu-latest
    if: false  # Enable for fuzzing runs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz
        with:
          version: latest

      - name: List fuzz targets
        run: cargo fuzz list || echo "No fuzz targets found"

      - name: Run fuzzing (short run)
        run: |
          for target in $(cargo fuzz list 2>/dev/null || echo ""); do
            echo "Fuzzing target: $target"
            cargo fuzz run $target -- -max_total_time=60s || true
          done

  # Dependency review action
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          allow-ghsas: |
            GHSA-xxxx-xxxx-xxxx-allow

  # SBOM generation
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate SBOM
        run: |
          cargo metadata --format-version 1 > cargo-metadata.json || true
          echo "SBOM would be generated here"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: cargo-metadata.json
          retention-days: 90

  # Security hardening verification
  security-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run security-focused clippy lints
        run: |
          cargo clippy -- -W clippy::all \
            -W clippy::pedantic \
            -W clippy::cargo \
            -A clippy::unwrap_used \
            -A clippy::expect_used \
            2>&1 | tee clippy-security.log || true

      - name: Check for hardcoded credentials
        run: |
          echo "Checking for hardcoded credentials..."
          grep -rn "password\s*=\s*['\"][^'\"]*['\"]" --include="*.rs" src/ || true
          grep -rn "api_key\s*=\s*['\"][^'\"]*['\"]" --include="*.rs" src/ || true
          grep -rn "secret\s*=\s*['\"][^'\"]*['\"]" --include="*.rs" src/ || true

      - name: Check for dangerous functions
        run: |
          echo "Checking for potentially dangerous functions..."
          grep -rn "gets(" --include="*.rs" src/ || echo "No unsafe string functions found"
          grep -rn "strcpy(" --include="*.rs" src/ || echo "No strcpy found"
          grep -rn "sprintf(" --include="*.rs" src/ || echo "No sprintf found"

      - name: Upload security lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-lint-report
          path: clippy-security.log
          retention-days: 30

  # CVSS scoring and vulnerability tracking
  vulnerability-tracking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate vulnerability report
        run: |
          echo "# Vulnerability Tracking Report" > vuln-report.md
          echo "Generated: $(date)" >> vuln-report.md
          echo "" >> vuln-report.md

          if cargo audit 2>&1 | tee audit.log; then
            echo "✅ No vulnerabilities found" >> vuln-report.md
          else
            echo "⚠️ Vulnerabilities detected - see audit.log" >> vuln-report.md
            grep -A2 "vulnerability" audit.log >> vuln-report.md || true
          fi

          cat vuln-report.md

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: vuln-report.md
          retention-days: 90