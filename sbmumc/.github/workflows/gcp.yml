name: GCP Deployment

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: staging

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT || 'sbmumc-project' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER || 'sbmumc-cluster' }}
  SERVICE_NAME: ${{ vars.SERVICE_NAME || 'sbmumc-service' }}

jobs:
  # Setup and authentication
  setup:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: vars
        run: echo "short_sha=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

  # Build and push to Google Container Registry
  build-and-push-gcr:
    runs-on: ubuntu-latest
    needs: [setup]
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      image: gcr.io/${{ env.GCP_PROJECT }}/sbmumc:${{ needs.setup.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to GCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            gcr.io/${{ env.GCP_PROJECT }}/sbmumc:${{ needs.setup.outputs.short_sha }}
            gcr.io/${{ env.GCP_PROJECT }}/sbmumc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Google Kubernetes Engine
  deploy-gke:
    runs-on: ubuntu-latest
    needs: [build-and-push-gcr]
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/sbmumc \
            sbmumc=${{ needs.build-and-push-gcr.outputs.image }}

          kubectl rollout status deployment/sbmumc \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -l app=sbmumc
          kubectl get services sbmumc-service

  # Deploy Cloud Run service
  deploy-cloud-run:
    runs-on: ubuntu-latest
    needs: [build-and-push-gcr]
    if: false  # Enable if using Cloud Run
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ needs.build-and-push-gcr.outputs.image }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated

  # Deploy Cloud Functions
  deploy-functions:
    runs-on: ubuntu-latest
    if: false  # Enable if using Cloud Functions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy sbmumc-function \
            --runtime nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --region ${{ env.GCP_REGION }}

  # Terraform on GCP
  terraform-gcp:
    runs-on: ubuntu-latest
    if: false  # Enable if using Terraform on GCP
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      actions: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: ./infrastructure/gcp
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        run: terraform init

      - name: Terraform Format
        working-directory: ./infrastructure/gcp
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ./infrastructure/gcp
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./infrastructure/gcp
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ./infrastructure/gcp
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        run: terraform apply -auto-approve tfplan

  # Cloud SQL database migrations
  database-migrations:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run database migrations
        run: |
          echo "Running Cloud SQL migrations..."
          # Add migration logic here

      - name: Verify migrations
        run: |
          echo "Verifying Cloud SQL database..."

  # Firebase deployment
  deploy-firebase:
    runs-on: ubuntu-latest
    if: false  # Enable if using Firebase
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: |
          firebase deploy \
            --project ${{ env.GCP_PROJECT }} \
            --token ${{ secrets.FIREBASE_TOKEN }}

  # Post-deployment monitoring
  post-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-gke]
    if: always()
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Check GKE service status
        run: |
          kubectl get all -l app=sbmumc

      - name: Create monitoring dashboard
        if: github.event.inputs.environment == 'production'
        run: |
          echo "Creating GKE monitoring dashboard..."
          # Add dashboard creation logic

      - name: Send notification
        run: |
          echo "GCP deployment to ${{ github.event.inputs.environment || 'staging' }} completed"