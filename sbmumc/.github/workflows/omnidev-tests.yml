name: OmniDev Integration Tests

on:
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**/integrations/**'
      - '**/omnidev/**'
  pull_request:
    paths:
      - '**.rs'
      - '**/integrations/**'
      - '**/omnidev/**'

jobs:
  # VSCode Extension Tests
  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: integrations/vscode/package-lock.json

      - name: Install dependencies
        run: cd integrations/vscode && npm install

      - name: Run tests
        run: cd integrations/vscode && npm test

      - name: Package extension
        run: cd integrations/vscode && npx vsce package --allow-missing-repository

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: integrations/vscode/*.vsix

  # JetBrains Plugin Tests
  jetbrains-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle build
        run: cd integrations/jetbrains && ./gradlew check

  # Neovim LSP Tests
  neovim-lsp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          sudo add-apt-repository -y ppa:neovim-ppa/unstable
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Run integration tests
        run: |
          cd integrations/neovim
          make test

  # GitHub CLI Extension Tests
  github-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Test CLI
        run: |
          cd integrations/github
          go test ./...
          go build -o sbmumc-gh ./...

  # OmniDev Core Tests
  omnidev-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test:
          - name: LSP Protocol Tests
            cmd: cargo test --package omnidev-core -- lsp
          - name: Code Analysis Tests
            cmd: cargo test --package omnidev-core -- analysis
          - name: Refactoring Tests
            cmd: cargo test --package omnidev-core -- refactor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          version: stable

      - name: Run ${{ matrix.test.name }}
        run: ${{ matrix.test.cmd }}

  # Full Integration Test
  integration-full:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SBMUMC
        run: cargo install --path .

      - name: Test CLI
        run: |
          sbmumc --version
          sbmumc analyze --help
          sbmumc omnidev --help

      - name: Test OmniDev
        run: |
          sbmumc omnidev init --test-project
          sbmumc omnidev analyze
          sbmumc omnidev refactor --dry-run

      - name: Test GitHub Integration
        run: |
          sbmumc github connect --dry-run
          sbmumc github pr review --dry-run

  # Performance Tests
  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          version: stable

      - name: Run benchmarks
        run: |
          cargo bench --all-features -- --sample-size 10 --noise-threshold 0.1

      - name: Compare with baseline
        run: |
          echo "Checking performance regression..."
          # Compare with main branch benchmarks