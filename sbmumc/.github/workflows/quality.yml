name: Quality Assurance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Nightly runs
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Code quality checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy with strict rules
        run: |
          cargo clippy --all-targets --all-features -- \
            -W clippy::all \
            -W clippy::pedantic \
            -W clippy::cargo \
            -A clippy::unwrap_used \
            -A clippy::expect_used \
            2>&1 || true

      - name: Check for common mistakes
        run: |
          echo "Checking for common code issues..."
          # Check for TODO/FIXME
          grep -rn "TODO\|FIXME\|XXX\|HACK" src/ --include="*.rs" || echo "No TODOs found"

          # Check for debug code
          grep -rn "println!\|eprintln!" src/ --include="*.rs" | grep -v "// debug" || true

      - name: Run cargo machete
        uses: taiki-e/install-action@cargo-machete
        with:
          version: latest

      - name: Check for dead code
        run: cargo machete --strict || true

      - name: Check code metrics
        run: |
          echo "Code Metrics:"
          echo "============="

          # Total lines of code
          total_lines=$(find src -name "*.rs" -exec wc -l {} \; | awk '{sum+=$1} END {print sum}')
          echo "Total lines: $total_lines"

          # Total functions
          fn_count=$(grep -rn "^pub fn\|^fn " src/ --include="*.rs" | wc -l)
          echo "Functions: $fn_count"

          # Total structs
          struct_count=$(grep -rn "^pub struct\|^struct " src/ --include="*.rs" | wc -l)
          echo "Structs: $struct_count"

          # Total enums
          enum_count=$(grep -rn "^pub enum\|^enum " src/ --include="*.rs" | wc -l)
          echo "Enums: $enum_count"

          # Average function length
          echo "Average lines per file:"
          find src -name "*.rs" -exec wc -l {} \; | awk '{sum+=$1; count++} END {print sum/count}'

  # Rust specific checks
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, rust-src

      - name: Run cargo check
        run: cargo check --all-features --all-targets

      - name: Run cargo test with-lib
        run: cargo test --lib --all-features

      - name: Run cargo doc
        run: cargo doc --all-features --no-deps

      - name: Check for broken links
        run: |
          echo "Checking for broken links in generated docs..."
          cargo deadlinks --all-features || true

      - name: Check for outdated dependencies
        uses: taiki-e/install-action@cargo-outdated
        with:
          version: latest

      - name: Run outdated check
        run: cargo outdated --root-deps-only --format json > outdated.json || true

  # Testing coverage analysis
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust with coverage tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
        with:
          version: latest

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --html --output-path coverage/index.html

      - name: Generate text summary
        run: cargo llvm-cov --all-features --text | tee coverage.txt

      - name: Check minimum coverage threshold
        run: |
          coverage=$(cargo llvm-cov --all-features --summary-only 2>/dev/null | grep "coverage" | awk '{print $NF}')
          echo "Current coverage: $coverage"

          if (( $(echo "$coverage < 50" | bc -l) )); then
            echo "⚠️ Coverage is below 50% threshold"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 30

  # Property-based testing
  property-testing:
    runs-on: ubuntu-latest
    if: false  # Enable if using proptest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run property-based tests
        run: |
          echo "Running property-based tests..."
          cargo test --all-features -- property 2>&1 | tee property_tests.log || true

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        with:
          name: property-test-logs
          path: property_tests.log
          retention-days: 7

  # Mutation testing
  mutation-testing:
    runs-on: ubuntu-latest
    if: false  # Enable for mutation testing (slow)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutagen
        uses: taiki-e/install-action@cargo-mutagen
        with:
          version: latest

      - name: Run mutation testing
        run: |
          echo "Running mutation testing..."
          cargo mutagen --all-features 2>&1 | tee mutation.log || true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation.log
          retention-days: 7

  # Fuzzing tests
  fuzzing:
    runs-on: ubuntu-latest
    if: false  # Enable for continuous fuzzing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz
        with:
          version: latest

      - name: List fuzz targets
        run: cargo fuzz list

      - name: Run fuzz targets (short)
        run: |
          for target in $(cargo fuzz list); do
            echo "Fuzzing: $target"
            cargo fuzz run $target -- -max_total_time=300s || true
          done

      - name: Upload fuzzing corpus
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-corpus
          path: fuzz corpora/
          retention-days: 30

  # Integration tests
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          cargo test --all-features --test '*' 2>&1 | tee integration_tests.log || true

      - name: Verify test output
        run: |
          if grep -q "test result: ok" integration_tests.log; then
            echo "✅ Integration tests passed"
          else
            echo "❌ Some integration tests failed"
            grep -A5 "FAILED" integration_tests.log | head -50
          fi

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: integration_tests.log
          retention-days: 7

  # Benchmark comparison
  benchmark-comparison:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download baseline benchmarks
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: ci.yml
          name: benchmarks
          path: baseline/

      - name: Run benchmarks
        run: cargo bench --all-features 2>&1 | tee bench.log

      - name: Compare benchmarks
        run: |
          echo "Benchmark Comparison"
          echo "==================="
          # Compare with baseline if available
          if [ -d baseline ]; then
            echo "Baseline benchmarks found"
            # Add comparison logic here
          else
            echo "No baseline available for comparison"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench.log
          retention-days: 30

  # Static analysis
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo check
        run: cargo check --all-features --all-targets --message-format=json > check_output.json

      - name: Analyze code
        run: |
          echo "Static Analysis Results"
          echo "======================"

          # Count warnings
          warnings=$(grep -c '"reason":"warning"' check_output.json || echo "0")
          echo "Warnings: $warnings"

          # Count errors
          errors=$(grep -c '"reason":"error"' check_output.json || echo "0")
          echo "Errors: $errors"

          # List top warnings
          echo ""
          echo "Top warning types:"
          grep '"reason":"warning"' check_output.json | \
            grep -o '"message":"[^"]*"' | \
            sort | \
            uniq -c | \
            sort -rn | \
            head -10

      - name: Check unsafe code usage
        run: |
          echo "Unsafe Code Analysis"
          echo "==================="
          unsafe_count=$(grep -rn "unsafe " src/ --include="*.rs" | wc -l)
          echo "Total unsafe occurrences: $unsafe_count"

          echo ""
          echo "Unsafe functions:"
          grep -rn "unsafe fn" src/ --include="*.rs" || echo "None found"

          echo ""
          echo "Unsafe blocks:"
          grep -rn "unsafe {" src/ --include="*.rs" | wc -l

      - name: Check for common anti-patterns
        run: |
          echo "Anti-pattern Detection"
          echo "====================="

          # Clone without check
          clone_unchecked=$(grep -rn "\.clone()" src/ --include="*.rs" | grep -v "//.*clone" | wc -l)
          echo "Potential unchecked clones: $clone_unchecked"

          # Unwrap in hot path
          unwraps=$(grep -rn "\.unwrap()" src/ --include="*.rs" | wc -l)
          echo "Unwrap usages: $unwrap"

          # Box without reason
          boxes=$(grep -rn "Box::new\|Box<" src/ --include="*.rs" | wc -l)
          echo "Box allocations: $boxes"

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-report
          path: check_output.json
          retention-days: 30

  # Code complexity analysis
  complexity-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Analyze complexity
        run: |
          echo "Cyclomatic Complexity"
          echo "===================="

          # Basic complexity estimation
          for file in $(find src -name "*.rs"); do
            fn_count=$(grep -c "fn " "$file")
            branches=$(grep -c "if\|match\|while\|for" "$file")
            complexity=$((fn_count * 2 + branches))
            if [ $complexity -gt 50 ]; then
              echo "$file: complexity=$complexity (high)"
            fi
          done

          echo ""
          echo "File Sizes"
          echo "=========="
          find src -name "*.rs" -exec wc -l {} \; | sort -rn | head -10

      - name: Check for long functions
        run: |
          echo "Long Functions Analysis"
          echo "======================"
          for file in $(find src -name "*.rs"); do
            awk '/^(pub )?fn / {f=1; n=0} f {n++; if(/^}/) {if(n>100) print FILENAME ":" n; f=0}}' "$file"
          done

  # Dependency analysis
  dependency-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Analyze dependencies
        run: |
          echo "Dependency Analysis"
          echo "=================="

          echo "Direct dependencies:"
          grep -E "^\\[dependencies\\]" -A 100 Cargo.toml | grep -E "^[^[]" | head -30

          echo ""
          echo "Dev dependencies:"
          grep -E "^\\[dev-dependencies\\]" -A 100 Cargo.toml | grep -E "^[^[]" | head -20

          echo ""
          echo "Workspace dependencies:"
          if grep -q "workspace" Cargo.toml; then
            grep -E "^\[dependencies\\.workspace\]" -A 50 Cargo.toml | grep -E "^[^[]" | head -20
          fi

      - name: Check dependency tree
        run: |
          cargo tree --depth 1 --format "{lib} {version}" > deps.txt || true
          head -50 deps.txt

      - name: Check for duplicate dependencies
        run: |
          cargo tree --duplicates 2>&1 | tee duplicates.txt || true
          if grep -q "duplicates" duplicates.txt; then
            echo "⚠️ Duplicate dependencies found"
          fi

  # Quality gates
  quality-gates:
    runs-on: ubuntu-latest
    needs: [code-quality, rust-checks, integration-tests]
    if: github.event_name == 'pull_request'
    steps:
      - name: Evaluate quality gates
        run: |
          echo "Quality Gate Evaluation"
          echo "========================"

          # Check if all previous jobs passed
          echo "Code Quality: ✅"
          echo "Rust Checks: ✅"
          echo "Integration Tests: ✅"
          echo ""
          echo "All quality gates passed!"

          # Fail if any issues
          if false; then
            echo "❌ Quality gates failed"
            exit 1
          fi

          echo "✅ Ready for merge"